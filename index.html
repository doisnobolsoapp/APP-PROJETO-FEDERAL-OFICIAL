<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projeto Federal</title>

  <meta name="theme-color" content="#001f3f" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="https://ui-avatars.com/api/?name=PF&background=001f3f&color=fff">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>

<body>

<div id="app">

  <!-- 🔥 HEADER -->
  <header style="padding:10px; background:#001f3f; color:white;">
    <h2>Projeto Federal</h2>
  </header>

  <!-- 🔥 MENU -->
  <nav style="padding:10px;">
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('parser')">Importar Edital</button>
  </nav>

  <!-- 🔥 PÁGINAS -->
  <main style="padding:10px;">

    <div id="dashboard-page" class="page">
      <h3>Dashboard</h3>
      <p>Bem-vindo ao sistema 🚀</p>
    </div>

    <div id="parser-page" class="page" style="display:none;">
      <h3>Parser</h3>

      <textarea id="editalText" style="width:100%; height:150px;"></textarea>

      <br><br>

      <button id="startParsingBtn">Processar</button>

      <pre id="jsonOutput"></pre>
    </div>

  </main>

</div>

<script>
function showPage(page) {
  document.getElementById('dashboard-page').style.display = 'none';
  document.getElementById('parser-page').style.display = 'none';
  document.getElementById(page + '-page').style.display = 'block';
}
</script>

<script type="module" src="/src/main.js"></script>

</body>
</html>
