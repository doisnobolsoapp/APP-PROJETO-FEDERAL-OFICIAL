<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Federal | Inteligência em Concursos</title>

    <link rel="manifest" href="/manifest.json">

    <meta name="theme-color" content="#001f3f">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Projeto Federal">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=PF&background=001f3f&color=fff&size=192">

    <!-- FIX fetch -->
    <script>
        (function() {
            try {
                const originalFetch = window.fetch;
                Object.defineProperty(window, 'fetch', {
                    configurable: true,
                    get: () => originalFetch,
                    set: () => console.warn('System: Attempted to overwrite window.fetch.')
                });
            } catch (e) {}
        })();
    </script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- 🔥 CORREÇÃO CRÍTICA -->
<div id="app">

    <div class="app-container">

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-shield-halved"></i>
                    <span>Projeto Federal</span>
                </div>
                <button class="toggle-btn" id="toggleSidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-page="dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>

                    <li class="nav-item" data-page="parser">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        <span>Importar Edital</span>
                    </li>

                    <li class="nav-item" data-page="plans">
                        <i class="fas fa-folder-open"></i>
                        <span>Planos</span>
                    </li>

                    <li class="nav-item" data-page="subjects">
                        <i class="fas fa-book"></i>
                        <span>Disciplinas</span>
                    </li>

                    <li class="nav-item" data-page="announcement">
                        <i class="fas fa-file-contract"></i>
                        <span>Edital</span>
                    </li>

                    <li class="nav-item" data-page="stats">
                        <i class="fas fa-chart-pie"></i>
                        <span>Estatísticas</span>
                    </li>

                    <li class="nav-item" data-page="mock-exams">
                        <i class="fas fa-list-check"></i>
                        <span>Simulados</span>
                    </li>

                    <li class="nav-item" data-page="planning">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Planejamento</span>
                    </li>
                </ul>

                <div id="installContainer" style="display:none; padding:1rem;">
                    <button id="installBtn" class="btn btn-primary w-full">
                        <i class="fas fa-download"></i> Instalar App
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <p>© 2026 Projeto Federal</p>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <header class="top-navbar">
                <div class="nav-left">
                    <button id="mobileMenuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="pageTitle">Dashboard</h1>
                </div>
            </header>

            <div class="content-wrapper">

                <!-- DASHBOARD -->
                <div id="dashboard-page" class="page active">
                    <p>Dashboard carregado ✅</p>
                </div>

                <!-- PARSER -->
                <div id="parser-page" class="page">
                    <textarea id="editalText"></textarea>
                    <button id="startParsingBtn">Processar</button>
                    <pre id="jsonOutput"></pre>
                </div>

                <!-- OUTRAS PÁGINAS -->
                <div id="plans-page" class="page"></div>
                <div id="subjects-page" class="page"></div>
                <div id="announcement-page" class="page"></div>
                <div id="stats-page" class="page"></div>
                <div id="mock-exams-page" class="page"></div>
                <div id="planning-page" class="page"></div>

            </div>
        </main>
    </div>

</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
