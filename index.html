<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Federal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{display:flex;height:100vh;background:#f4f6f9}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#001f3f;
  color:#fff;
  padding:20px;
}
.nav-item{
  padding:12px;
  margin-bottom:8px;
  cursor:pointer;
  border-radius:6px;
}
.nav-item:hover{background:#003366}
.nav-item.active{background:#0074D9}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

.page{display:none}
.page.active{display:block}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:10px;
  border:none;
  background:#0074D9;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

textarea{
  width:100%;
  height:120px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>Projeto Federal</h2>

  <div class="nav-item active" data-page="dashboard">Dashboard</div>
  <div class="nav-item" data-page="parser">Importar Edital</div>
  <div class="nav-item" data-page="subjects">Disciplinas</div>
  <div class="nav-item" data-page="planning">Planejamento</div>
  <div class="nav-item" data-page="mock">Simulados</div>
</div>

<div class="main">
  <h1 id="title">Dashboard</h1>

  <div id="dashboard" class="page active">
    <div class="card">Bem-vindo 🚀</div>
  </div>

  <div id="parser" class="page">
    <div class="card">
      <textarea id="input"></textarea>
      <button onclick="parse()">Processar</button>
      <pre id="output"></pre>
    </div>
  </div>

  <div id="subjects" class="page">
    <div class="card">Lista de disciplinas (em breve)</div>
  </div>

  <div id="planning" class="page">
    <div class="card">Planejamento (em breve)</div>
  </div>

  <div id="mock" class="page">
    <div class="card">Simulados (em breve)</div>
  </div>
</div>

<script>
const navItems = document.querySelectorAll('.nav-item')
const pages = document.querySelectorAll('.page')

navItems.forEach(item=>{
  item.onclick=()=>{
    navItems.forEach(i=>i.classList.remove('active'))
    item.classList.add('active')

    pages.forEach(p=>p.classList.remove('active'))
    document.getElementById(item.dataset.page).classList.add('active')

    document.getElementById('title').innerText=item.innerText
  }
})

function parse(){
  const text=document.getElementById('input').value

  const disciplinas=text.split(/\n|,|;/).map(t=>t.trim()).filter(t=>t)

  const result={
    verticalizado: disciplinas.map((d,i)=>({
      disciplina:d,
      topicos:[{id:i+1,descricao:'Tópico geral'}]
    }))
  }

  document.getElementById('output').textContent=JSON.stringify(result,null,2)
}
</script>

</body>
</html>
